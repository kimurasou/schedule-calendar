<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利用者予定表カレンダー</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    /* ===== Upload Screen ===== */
    #upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .upload-title {
      font-size: 24px;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 8px;
    }

    .upload-subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
    }

    .drop-zone {
      width: 100%;
      max-width: 480px;
      border: 3px dashed #90cdf4;
      border-radius: 16px;
      background: #fff;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #3182ce;
      background: #ebf8ff;
    }

    .drop-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .drop-label {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 8px;
    }

    .drop-sub {
      font-size: 13px;
      color: #718096;
      margin-bottom: 24px;
    }

    .btn-upload {
      display: inline-block;
      padding: 10px 24px;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-upload:hover { background: #2c5282; }

    #file-input { display: none; }

    /* ===== App Screen ===== */
    #app-screen {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .app-header {
      background: #2b6cb0;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      flex-shrink: 0;
    }

    .app-header h1 { font-size: 18px; font-weight: 700; }

    .btn-reset {
      margin-left: auto;
      padding: 6px 14px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: rgba(255,255,255,0.35); }

    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 700;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #e2e8f0;
      background: #f7fafc;
    }

    .user-list {
      overflow-y: auto;
      flex: 1;
    }

    .user-item {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f4f8;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-item:hover { background: #ebf8ff; }
    .user-item.active { background: #bee3f8; font-weight: 600; color: #2b6cb0; }

    .user-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #90cdf4;
      flex-shrink: 0;
    }
    .user-item.active .user-dot { background: #3182ce; }
    .user-item.no-schedule .user-dot { background: #cbd5e0; }
    .user-item.no-schedule .user-name { color: #a0aec0; }

    .user-name { font-size: 13px; }

    /* ===== Main Content ===== */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .calendar-title {
      font-size: 22px;
      font-weight: 700;
      color: #2d3748;
    }

    .calendar-title .month-badge {
      display: inline-block;
      margin-left: 12px;
      padding: 2px 10px;
      background: #bee3f8;
      color: #2b6cb0;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-text-copy {
      background: #48bb78;
      color: #fff;
    }
    .btn-text-copy:hover { background: #38a169; }

    .btn-img-copy {
      background: #ed8936;
      color: #fff;
    }
    .btn-img-copy:hover { background: #dd6b20; }

    .btn-print {
      background: #667eea;
      color: #fff;
    }
    .btn-print:hover { background: #5a67d8; }

    .btn:active { transform: scale(0.97); }

    /* ===== Calendar Table ===== */
    .calendar-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .calendar-table {
      width: 100%;
      border-collapse: collapse;
    }

    .calendar-table thead th {
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      background: #2b6cb0;
      color: #fff;
    }

    .calendar-table thead th.sun { background: #c53030; }
    .calendar-table thead th.sat { background: #2c5282; }

    .calendar-table td {
      border: 1px solid #e2e8f0;
      vertical-align: top;
      width: calc(100% / 7);
      min-height: 90px;
      padding: 0;
    }

    .cell-inner {
      padding: 6px 8px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cell-empty { background: #f7fafc; min-height: 90px; }

    .day-num {
      font-size: 15px;
      font-weight: 700;
      color: #4a5568;
      line-height: 1;
    }

    .day-num.sun { color: #c53030; }
    .day-num.sat { color: #2c5282; }

    .cell-no-schedule .day-num { color: #a0aec0; }
    .cell-no-schedule { background: #fff; }

    .cell-has-schedule { background: #ebf8ff; }
    .cell-has-schedule:hover { background: #bee3f8; }

    .meal-badge {
      display: inline-block;
      padding: 1px 6px;
      background: #f6ad55;
      color: #fff;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      width: fit-content;
    }

    .schedule-time {
      font-size: 12px;
      font-weight: 600;
      color: #2b6cb0;
      line-height: 1.4;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d3748;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== No Schedule Placeholder ===== */
    .no-schedule-msg {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
      font-size: 16px;
    }

    /* ===== Print ===== */
    @media print {
      #upload-screen { display: none !important; }
      .app-header, .sidebar, .action-buttons { display: none !important; }
      .main-content { padding: 0; overflow: visible; }
      .app-screen { height: auto; }
      .calendar-wrapper { box-shadow: none; }
      .calendar-header { margin-bottom: 12px; }
    }
  </style>
</head>
<body>

<!-- ===== Upload Screen ===== -->
<div id="upload-screen">
  <div class="upload-title">利用者予定表カレンダー</div>
  <div class="upload-subtitle">Excelファイルを読み込んで、利用者ごとのカレンダーを表示します</div>

  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">📂</div>
    <div class="drop-label">Excelファイルをここにドロップ</div>
    <div class="drop-sub">または</div>
    <button class="btn-upload" onclick="document.getElementById('file-input').click()">
      ファイルを選択
    </button>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>
</div>

<!-- ===== App Screen ===== -->
<div id="app-screen" style="display:none; height:100vh; display:none; flex-direction:column;">
  <div class="app-header">
    <h1 id="app-title">予定表カレンダー</h1>
    <button class="btn-reset" onclick="resetApp()">別のファイルを開く</button>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-header">利用者一覧</div>
      <div class="user-list" id="user-list"></div>
    </div>
    <div class="main-content" id="main-content">
      <div class="no-schedule-msg">← 利用者を選択してください</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let appData = null;
let selectedUserIndex = -1;

// ===== File Handling =====
document.getElementById('file-input').addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      appData = parseExcel(e.target.result);
      renderApp();
    } catch (err) {
      alert('ファイルの読み込みに失敗しました。\n' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== Excel Parsing =====
function parseExcel(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array', raw: false });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });

  // Row index 2: ('名前', '5月', ...)
  let month = 5, year = new Date().getFullYear();
  const monthRow = rows[2] || [];
  for (const cell of monthRow) {
    if (cell && typeof cell === 'string') {
      const m = cell.match(/(\d+)月/);
      if (m) { month = parseInt(m[1]); break; }
    }
  }

  // Row index 3: dates  (1日, 2日, ...)
  // Row index 4: DOW    (金, 土, ...)
  const datesRow = rows[3] || [];
  const dowRow = rows[4] || [];

  const colToDay = {}; // col -> { dayNum, dow }
  for (let col = 1; col < datesRow.length; col++) {
    const cell = datesRow[col];
    if (cell && typeof cell === 'string' && cell.match(/^\d+日$/)) {
      colToDay[col] = { dayNum: parseInt(cell), dow: dowRow[col] || '' };
    }
  }

  // Detect DOW of day 1 for calendar layout
  let firstDow = '月';
  for (const [, info] of Object.entries(colToDay)) {
    if (info.dayNum === 1) { firstDow = info.dow; break; }
  }

  // Users start at row index 6 (row 7), 2 rows each
  const users = [];
  let i = 6;
  while (i < rows.length - 1) {
    const nameRow = rows[i] || [];
    const timeRow = rows[i + 1] || [];
    const rawName = nameRow[0];

    if (!rawName || typeof rawName !== 'string') { i++; continue; }
    const name = rawName.replace(/\u3000/g, ' ').trim();
    if (!name || name === '通所人数' || name.includes('通所')) { i += 2; continue; }

    const schedule = {};
    for (const [colStr, { dayNum, dow }] of Object.entries(colToDay)) {
      const col = parseInt(colStr);
      const startRaw = nameRow[col];
      const endRaw = timeRow[col];

      if (startRaw !== null && startRaw !== undefined && startRaw !== '') {
        const startStr = startRaw.toString();
        const hasMeal = startStr.includes('食');
        let startTime = startStr.replace(/\n?食/g, '').trim();

        // Handle "0:00" which is likely a time-formatted empty or midnight
        if (startTime === '0:00') startTime = '';

        const endTime = endRaw ? endRaw.toString().trim() : null;

        schedule[dayNum] = { start: startTime, end: endTime, meal: hasMeal, dow };
      } else if (endRaw !== null && endRaw !== undefined && endRaw !== '') {
        // End time exists but no start time
        schedule[dayNum] = { start: null, end: endRaw.toString().trim(), meal: false, dow };
      }
    }

    const hasAnySchedule = Object.keys(schedule).length > 0;
    users.push({ name, schedule, hasAnySchedule });
    i += 2;
  }

  return { year, month, users, firstDow };
}

// ===== App Rendering =====
function renderApp() {
  document.getElementById('upload-screen').style.display = 'none';
  const appScreen = document.getElementById('app-screen');
  appScreen.style.display = 'flex';

  const { year, month, users } = appData;
  document.getElementById('app-title').textContent = `${year}年${month}月 予定表カレンダー`;

  // User list
  const listEl = document.getElementById('user-list');
  listEl.innerHTML = '';
  users.forEach((user, idx) => {
    const item = document.createElement('div');
    item.className = `user-item${user.hasAnySchedule ? '' : ' no-schedule'}`;
    item.dataset.index = idx;
    item.innerHTML = `<span class="user-dot"></span><span class="user-name">${user.name}</span>`;
    item.addEventListener('click', () => selectUser(idx));
    listEl.appendChild(item);
  });

  // Auto-select first user with schedule
  const firstIdx = users.findIndex(u => u.hasAnySchedule);
  if (firstIdx >= 0) selectUser(firstIdx);
}

function selectUser(index) {
  selectedUserIndex = index;

  // Update sidebar active state
  document.querySelectorAll('.user-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.index) === index);
  });

  // Render calendar
  const user = appData.users[index];
  const { year, month, firstDow } = appData;
  const mainContent = document.getElementById('main-content');

  if (!user.hasAnySchedule) {
    mainContent.innerHTML = `
      <div class="calendar-header">
        <div class="calendar-title">${user.name}<span class="month-badge">${month}月</span></div>
      </div>
      <div class="no-schedule-msg">📋 この利用者の予定はありません</div>
    `;
    return;
  }

  mainContent.innerHTML = `
    <div class="calendar-header">
      <div class="calendar-title">${user.name}<span class="month-badge">${year}年${month}月</span></div>
      <div class="action-buttons">
        <button class="btn btn-text-copy" onclick="copyAsText()">📋 テキストコピー</button>
        <button class="btn btn-img-copy" onclick="saveAsImage()">📥 画像保存</button>
        <button class="btn btn-print" onclick="printCalendar()">🖨 印刷</button>
      </div>
    </div>
    <div class="calendar-wrapper" id="calendar-wrapper">
      ${buildCalendarHTML(user, year, month, firstDow)}
    </div>
  `;
}

// ===== Calendar Builder =====
const DOW_ORDER = ['日', '月', '火', '水', '木', '金', '土'];

function getDowIndex(dow) {
  const idx = DOW_ORDER.indexOf(dow);
  return idx >= 0 ? idx : 1;
}

function buildCalendarHTML(user, year, month, firstDow) {
  const startCol = getDowIndex(firstDow);
  const lastDay = new Date(year, month, 0).getDate();

  // Build week rows
  const weeks = [];
  let week = new Array(7).fill(null);
  let col = startCol;
  for (let day = 1; day <= lastDay; day++) {
    week[col] = day;
    col++;
    if (col === 7) { weeks.push(week); week = new Array(7).fill(null); col = 0; }
  }
  if (col > 0) weeks.push(week);

  let html = `<table class="calendar-table">
    <thead><tr>
      ${DOW_ORDER.map((d, i) => `<th class="${i===0?'sun':i===6?'sat':''}">${d}</th>`).join('')}
    </tr></thead>
    <tbody>`;

  for (const week of weeks) {
    html += '<tr>';
    for (let i = 0; i < 7; i++) {
      const day = week[i];
      if (!day) {
        html += '<td><div class="cell-empty"></div></td>';
        continue;
      }

      const sched = user.schedule[day];
      const dowClass = i === 0 ? 'sun' : i === 6 ? 'sat' : '';

      if (!sched) {
        html += `<td class="cell-no-schedule"><div class="cell-inner">
          <span class="day-num ${dowClass}">${day}</span>
        </div></td>`;
        continue;
      }

      const mealHtml = sched.meal ? '<span class="meal-badge">食</span>' : '';
      const timeHtml = (sched.start || sched.end)
        ? `<div class="schedule-time">${sched.start || ''}${sched.start && sched.end ? '<br>' : ''}${sched.end ? '〜' + sched.end : ''}</div>`
        : '';

      html += `<td class="cell-has-schedule"><div class="cell-inner">
        <span class="day-num ${dowClass}">${day}</span>
        ${mealHtml}
        ${timeHtml}
      </div></td>`;
    }
    html += '</tr>';
  }

  html += '</tbody></table>';
  return html;
}

// ===== Copy Functions =====
function copyAsText() {
  const user = appData.users[selectedUserIndex];
  const { year, month } = appData;
  if (!user) return;

  const lines = [`${user.name}　${year}年${month}月 予定表`, ''];
  const entries = Object.entries(user.schedule)
    .sort(([a], [b]) => parseInt(a) - parseInt(b));

  for (const [dayStr, sched] of entries) {
    const day = parseInt(dayStr);
    const dow = sched.dow || '';
    const time = [sched.start, sched.end ? '〜' + sched.end : ''].filter(Boolean).join('');
    const meal = sched.meal ? '　食事あり' : '';
    lines.push(`${day}日（${dow}）　${time}${meal}`);
  }

  navigator.clipboard.writeText(lines.join('\n'))
    .then(() => showToast('テキストをコピーしました'))
    .catch(() => showToast('コピーに失敗しました'));
}

async function saveAsImage() {
  const wrapper = document.getElementById('calendar-wrapper');
  if (!wrapper) return;

  showToast('画像を生成中...');

  try {
    const canvas = await html2canvas(wrapper, {
      backgroundColor: '#ffffff',
      scale: 2,
      useCORS: true
    });

    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const user = appData.users[selectedUserIndex];
      a.download = `${user.name}_${appData.year}年${appData.month}月予定表.png`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('画像を保存しました');
    }, 'image/png');
  } catch (err) {
    showToast('画像生成に失敗しました');
    console.error(err);
  }
}

function printCalendar() {
  const user = appData.users[selectedUserIndex];
  const { year, month, firstDow } = appData;
  if (!user) return;

  const printWin = window.open('', '_blank', 'width=900,height=700');
  printWin.document.write(`<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8">
    <title>${user.name} ${year}年${month}月 予定表</title>
    <style>
      body { font-family: 'Hiragino Sans','Meiryo',sans-serif; padding: 20px; }
      h2 { font-size: 18px; margin-bottom: 16px; color: #2d3748; }
      table { width: 100%; border-collapse: collapse; }
      thead th { background: #2b6cb0; color: #fff; padding: 8px; text-align: center; font-size: 13px; }
      thead th.sun { background: #c53030; }
      thead th.sat { background: #2c5282; }
      td { border: 1px solid #e2e8f0; vertical-align: top; }
      .cell-inner { padding: 6px; min-height: 80px; }
      .day-num { font-size: 14px; font-weight: 700; color: #4a5568; }
      .day-num.sun { color: #c53030; }
      .day-num.sat { color: #2c5282; }
      .cell-has-schedule { background: #ebf8ff; }
      .meal-badge { display: inline-block; padding: 1px 6px; background: #f6ad55; color: #fff; border-radius: 4px; font-size: 11px; font-weight: 700; }
      .schedule-time { font-size: 12px; font-weight: 600; color: #2b6cb0; margin-top: 4px; }
    </style>
  </head><body>
    <h2>${user.name}　${year}年${month}月 予定表</h2>
    ${buildCalendarHTML(user, year, month, firstDow)}
    <script>window.onload = () => { window.print(); window.close(); }<\/script>
  </body></html>`);
  printWin.document.close();
}

// ===== Reset =====
function resetApp() {
  appData = null;
  selectedUserIndex = -1;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('file-input').value = '';
}

// ===== Toast =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>
</body>
</html>
